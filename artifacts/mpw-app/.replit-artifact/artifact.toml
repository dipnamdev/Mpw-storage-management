kind = "web"
previewPath = "/"
title = "M.P. Warehousing & Logistics"
version = "1.0.0"
id = "artifacts/mpw-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23170

[services.development]
run = "pnpm --filter @workspace/mpw-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mpw-app", "run", "build" ]
publicDir = "artifacts/mpw-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23170"
BASE_PATH = "/"
